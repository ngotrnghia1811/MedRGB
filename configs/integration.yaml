retriever:
  retriever_name: MedCPT
  corpus_name: Textbooks
  db_dir: ./corpus
  k: 10

llm:
  llm_name: OpenAI/gpt-3.5-turbo
  temperature: 0.0
  context_length: 15000

benchmark:
  scenario: integration
  n_docs: 10
  signal_ratios: [20, 40, 60, 80, 100]  # p_sig >= 20 required
  use_online_retrieval: false

data:
  signal_docs_path: data/benchmark/signal_docs.json
  subqa_path: data/benchmark/subqa_pairs.json

datasets:
  - bioasq
  - pubmedqa
  - medqa
  - mmlu

output_dir: ./results/integration
